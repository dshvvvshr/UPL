version: '3.8'

services:
  # Node.js Gateway Implementation
  nodejs-gateway:
    build:
      context: .
      dockerfile: Dockerfile.nodejs
    container_name: upl-nodejs-gateway
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    environment:
      - GATEWAY_PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com}
      - DEFAULT_MODEL=${DEFAULT_MODEL:-gpt-4}
      - CORE_DIRECTIVE=${CORE_DIRECTIVE}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - upl-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Python FastAPI Gateway Implementation
  python-gateway:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: upl-python-gateway
    ports:
      - "${PYTHON_PORT:-8000}:8000"
    environment:
      - PYTHON_PORT=8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - upl-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Nginx load balancer for both implementations
  # Uncomment to enable unified access point
  # nginx:
  #   image: nginx:alpine
  #   container_name: upl-nginx
  #   ports:
  #     - "80:80"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - nodejs-gateway
  #     - python-gateway
  #   restart: unless-stopped
  #   networks:
  #     - upl-network

networks:
  upl-network:
    driver: bridge

